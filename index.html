<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificados · Avistar 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>

<style>
  :root {
    --teal:       #176f6f;
    --teal-light: #e8f4f4;
    --teal-dark:  #0e4a4a;
    --wine:       #5a1a1a;
    --cream:      #fdf6ee;
    --text:       #2a2a2a;
    --muted:      #777;
    --border:     #d8cfc5;
    --error:      #c0392b;
    --success:    #176f6f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--wine);
    padding: 28px 40px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  header img { height: 56px; }
  header .title-block h1 {
    font-family: 'Playfair Display', serif;
    color: #fff;
    font-size: 1.5rem;
    letter-spacing: 0.02em;
  }
  header .title-block p {
    color: rgba(255,255,255,0.65);
    font-size: 0.82rem;
    margin-top: 2px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Main ── */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 20px;
  }

  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 48px 44px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.07);
  }

  .card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--teal-dark);
    margin-bottom: 8px;
  }
  .card .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 32px;
    line-height: 1.5;
  }

  /* ── Inputs ── */
  .field { margin-bottom: 20px; }
  .field label {
    display: block;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }
  .field input {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.97rem;
    color: var(--text);
    background: #fafaf8;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .field input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(23,111,111,0.12);
    background: #fff;
  }

  /* ── Button ── */
  .btn {
    width: 100%;
    padding: 14px;
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.2s, transform 0.1s;
    margin-top: 4px;
  }
  .btn:hover  { background: var(--teal-dark); }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { background: #aaa; cursor: not-allowed; }

  /* ── Mensagens ── */
  .msg {
    margin-top: 20px;
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 0.92rem;
    line-height: 1.55;
    display: none;
  }
  .msg.error   { background: #fdf0ee; border: 1px solid #e8b4ae; color: var(--error); }
  .msg.success { background: var(--teal-light); border: 1px solid #b0d8d8; color: var(--teal-dark); }
  .msg.info    { background: #fdf8ee; border: 1px solid #e8d8ae; color: #7a5a10; }
  .msg.show    { display: block; }

  /* ── Fallback nome ── */
  #nome-fallback { display: none; margin-top: 20px; }
  #nome-fallback .sep {
    text-align: center;
    color: var(--muted);
    font-size: 0.82rem;
    margin-bottom: 16px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    position: relative;
  }
  #nome-fallback .sep::before,
  #nome-fallback .sep::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 38%;
    height: 1px;
    background: var(--border);
  }
  #nome-fallback .sep::before { left: 0; }
  #nome-fallback .sep::after  { right: 0; }

  /* ── Resultados ── */
  #resultados { display: none; margin-top: 28px; }
  #resultados h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--teal-dark);
    margin-bottom: 14px;
  }

  .cert-item {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .cert-item .info { flex: 1; }
  .cert-item .info .tipo {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 3px;
  }
  .cert-item .info .titulo-cert {
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.4;
  }
  .btn-dl {
    flex-shrink: 0;
    padding: 9px 18px;
    background: var(--wine);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn-dl:hover { background: #7a2a2a; }
  .btn-dl:disabled { background: #aaa; cursor: not-allowed; }

  /* ── Loading spinner ── */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    text-align: center;
    padding: 20px;
    font-size: 0.78rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>Avistar 2026</h1>
    <p>Emissão de Certificados · Encontro Brasileiro de Observação de Aves</p>
  </div>
</header>

<main>
  <div class="card">
    <h2>Seu Certificado</h2>
    <p class="subtitle">Digite o e-mail usado na inscrição para localizar e baixar seu certificado.</p>

    <!-- Campo email -->
    <div class="field">
      <label>E-mail de inscrição</label>
      <input type="email" id="input-email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <button class="btn" id="btn-buscar" onclick="buscarPorEmail()">Buscar certificado</button>

    <!-- Mensagem principal -->
    <div class="msg" id="msg-principal"></div>

    <!-- Fallback: busca por nome -->
    <div id="nome-fallback">
      <div class="sep">ou busque pelo nome</div>
      <div class="field">
        <label>Nome completo</label>
        <input type="text" id="input-nome" placeholder="Como está na sua inscrição" autocomplete="name">
      </div>
      <button class="btn" onclick="buscarPorNome()">Buscar pelo nome</button>
      <div class="msg" id="msg-nome"></div>
    </div>

    <!-- Resultados -->
    <div id="resultados">
      <h3 id="resultado-saudacao"></h3>
      <div id="lista-certs"></div>
    </div>
  </div>
</main>

<footer>
  Avistar 2026 · Jardim Botânico de São Paulo · 15 a 17 de maio de 2026
</footer>

<script>
// ── Estado ────────────────────────────────────────────────────────────────
let DB_INSCRITOS    = null;
let DB_NOMES        = null;
let DB_PALESTRANTES = null;
let pdfBaseBytes    = null;
let ubuntuBytes     = null;
let ubuntuBoldBytes = null;

// ── Carregamento dos dados ────────────────────────────────────────────────
async function carregarDados() {
  const base = window.location.pathname.replace(/\/[^/]*$/, '');
  const [ins, nom, pal, pdf, font, fontB] = await Promise.all([
    fetch(`${base}/inscritos.json`).then(r => r.json()),
    fetch(`${base}/inscritos_por_nome.json`).then(r => r.json()),
    fetch(`${base}/palestrantes.json`).then(r => r.json()),
    fetch(`${base}/certificados.pdf`).then(r => r.arrayBuffer()),
    fetch(`${base}/Ubuntu-Regular.ttf`).then(r => r.arrayBuffer()),
    fetch(`${base}/Ubuntu-Bold.ttf`).then(r => r.arrayBuffer()),
  ]);
  DB_INSCRITOS    = ins;
  DB_NOMES        = nom;
  DB_PALESTRANTES = pal;
  pdfBaseBytes    = pdf;
  ubuntuBytes     = font;
  ubuntuBoldBytes = fontB;
}

const dadosPromise = carregarDados();

// ── Normalização ──────────────────────────────────────────────────────────
function normEmail(e) { return e.trim().toLowerCase(); }
function normNome(n) {
  return n.trim().toUpperCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, " ");
}

// ── Busca por email ───────────────────────────────────────────────────────
async function buscarPorEmail() {
  await dadosPromise;
  const email = normEmail(document.getElementById('input-email').value);
  if (!email) { showMsg('msg-principal', 'error', 'Por favor, digite seu e-mail.'); return; }

  const inscrito    = DB_INSCRITOS[email]    || null;
  const palestrante = DB_PALESTRANTES[email] || null;

  if (!inscrito && !palestrante) {
    showMsg('msg-principal', 'error',
      'E-mail não encontrado. Verifique se digitou corretamente ou use a busca pelo nome abaixo.');
    document.getElementById('nome-fallback').style.display = 'block';
    document.getElementById('resultados').style.display = 'none';
    return;
  }

  showMsg('msg-principal', 'success', 'Inscrição encontrada! Seus certificados estão prontos.');
  document.getElementById('nome-fallback').style.display = 'none';
  mostrarResultados(inscrito, palestrante);
}

// ── Busca por nome ────────────────────────────────────────────────────────
async function buscarPorNome() {
  await dadosPromise;
  const nomeDigitado = document.getElementById('input-nome').value;
  const chave = normNome(nomeDigitado);
  if (!chave) { showMsg('msg-nome', 'error', 'Por favor, digite seu nome completo.'); return; }

  const inscrito = DB_NOMES[chave] || null;
  if (!inscrito) {
    showMsg('msg-nome', 'error',
      'Nome não encontrado. Verifique se digitou exatamente como estava na inscrição.');
    return;
  }

  // Tenta encontrar palestrante pelo nome também
  const palestrante = Object.entries(DB_PALESTRANTES)
    .find(([, works]) => normNome(works[0]?.autores?.split(',')[0] || '') === chave)?.[1] || null;

  hideMsg('msg-nome');
  showMsg('msg-principal', 'success', 'Inscrição encontrada pelo nome!');
  mostrarResultados(inscrito, palestrante);
}

// ── Exibe certificados disponíveis ───────────────────────────────────────
function mostrarResultados(inscrito, palestrante) {
  const lista = document.getElementById('lista-certs');
  lista.innerHTML = '';

  const nome = inscrito?.nome || palestrante?.[0]?.autores?.split(',')[0] || 'Participante';
  document.getElementById('resultado-saudacao').textContent = `Olá, ${nome}`;

  // Certificado de participação
  if (inscrito) {
    lista.appendChild(criarItemCert(
      'Certificado de Participação',
      `${inscrito.credencial} · Avistar 2026`,
      () => gerarCertParticipante(inscrito)
    ));
  }

  // Certificado(s) de apresentação
  if (palestrante) {
    palestrante.forEach((trabalho, i) => {
      const label = trabalho.label.charAt(0).toUpperCase() + trabalho.label.slice(1);
      lista.appendChild(criarItemCert(
        `Certificado de ${label}`,
        trabalho.titulo.length > 70 ? trabalho.titulo.slice(0, 70) + '…' : trabalho.titulo,
        () => gerarCertPalestrante(trabalho)
      ));
    });
  }

  document.getElementById('resultados').style.display = 'block';
}

function criarItemCert(tipo, titulo, onDownload) {
  const div = document.createElement('div');
  div.className = 'cert-item';
  div.innerHTML = `
    <div class="info">
      <div class="tipo">${tipo}</div>
      <div class="titulo-cert">${titulo}</div>
    </div>
    <button class="btn-dl" onclick="this.__dl()">
      ⬇ Baixar PDF
    </button>`;
  div.querySelector('.btn-dl').__dl = async function() {
    const btn = this;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Gerando…';
    try { await onDownload(); } catch(e) { console.error(e); }
    btn.disabled = false;
    btn.innerHTML = '⬇ Baixar PDF';
  };
  return div;
}

// ── Geração de PDF — participante ─────────────────────────────────────────
async function gerarCertParticipante(inscrito) {
  const { PDFDocument, rgb, StandardFonts } = PDFLib;

  const pdfDoc = await PDFDocument.load(pdfBaseBytes);
  pdfDoc.registerFontkit(fontkit);

  const fontReg  = await pdfDoc.embedFont(ubuntuBytes);
  const fontBold = await pdfDoc.embedFont(ubuntuBoldBytes);

  const page = pdfDoc.getPages()[0];
  const { width, height } = page.getSize();

  const TEAL = rgb(0.09, 0.40, 0.42);
  const DARK = rgb(0.15, 0.15, 0.15);

  const xLeft  = 211.8;
  const xRight = 522.0;
  const maxW   = xRight - xLeft;
  const cx     = (xLeft + xRight) / 2;
  const SN = 12, SD = 14;
  const LHN = 19, LHD = 24, GAP = 24;

  // Segmentos: [{text, bold}]
  const segs = [
    { text: "A Comissão Organizadora do Encontro Brasileiro de Observação de Aves certifica que", bold: false },
  ];
  const nome = inscrito.nome;
  const corpo = [
    { text: "participou como ", bold: false },
    { text: inscrito.credencial, bold: true },
    { text: " da 20ª edição do Avistar 2026, realizada entre os dias 15 e 17 de maio de 2026 no Jardim Botânico de São Paulo.", bold: false },
  ];

  // Quebrar linhas
  const lIntro  = wrapText(segs[0].text, fontReg,  SN, maxW);
  const lNome   = wrapText(nome,          fontBold, SD, maxW);
  const lCorpo  = wrapSegments(corpo, SN, maxW, fontReg, fontBold);

  const totalH = lIntro.length * LHN + GAP +
                 lNome.length  * LHD + GAP +
                 lCorpo.length * LHN;

  const areaTop    = height - 111.9;
  const areaBottom = height - 651.8;
  let y = areaBottom + ((areaTop - areaBottom) + totalH) / 2;

  // Intro — esquerda
  for (const line of lIntro) {
    page.drawText(line, { x: xLeft, y, font: fontReg, size: SN, color: DARK });
    y -= LHN;
  }
  y -= GAP;

  // Nome — centralizado teal
  for (const line of lNome) {
    const tw = fontBold.widthOfTextAtSize(line, SD);
    page.drawText(line, { x: cx - tw/2, y, font: fontBold, size: SD, color: TEAL });
    y -= LHD;
  }
  y -= GAP;

  // Corpo com credencial inline
  for (const lineTokens of lCorpo) {
    let x = xLeft;
    for (const { text, bold } of lineTokens) {
      const font = bold ? fontBold : fontReg;
      page.drawText(text, { x, y, font, size: SN, color: bold ? TEAL : DARK });
      x += font.widthOfTextAtSize(text, SN);
    }
    y -= LHN;
  }

  const pdfBytes = await pdfDoc.save();
  download(pdfBytes, `certificado_${nome.replace(/\s+/g,'_')}.pdf`);
}

// ── Geração de PDF — palestrante ──────────────────────────────────────────
async function gerarCertPalestrante(trabalho) {
  const { PDFDocument, rgb } = PDFLib;

  const pdfDoc = await PDFDocument.load(pdfBaseBytes);
  pdfDoc.registerFontkit(fontkit);

  const fontReg  = await pdfDoc.embedFont(ubuntuBytes);
  const fontBold = await pdfDoc.embedFont(ubuntuBoldBytes);

  const page = pdfDoc.getPages()[0];
  const { width, height } = page.getSize();

  const TEAL = rgb(0.09, 0.40, 0.42);
  const DARK = rgb(0.15, 0.15, 0.15);

  const xLeft  = 211.8;
  const xRight = 522.0;
  const maxW   = xRight - xLeft;
  const cx     = (xLeft + xRight) / 2;
  const SN = 12, ST = 13, SA = 12;
  const LHN = 19, LHT = 22, LHA = 19, GAP = 24;

  const intro   = `A Organização do Congresso Avistar 2026 certifica que ${trabalho.artigo} ${trabalho.label}`;
  const autoria = "de autoria de";
  const encerra = `${trabalho.verbo} na 20ª edição do Encontro Brasileiro de Observação de Aves, realizada entre os dias 15 e 17 de maio de 2026 no Jardim Botânico de São Paulo.`;

  const lIntro   = wrapText(intro,          fontReg,  SN, maxW);
  const lTitulo  = wrapText(trabalho.titulo, fontBold, ST, maxW);
  const lAutoria = wrapText(autoria,         fontReg,  SN, maxW);
  const lAutores = wrapText(trabalho.autores,fontBold, SA, maxW);
  const lEncerra = wrapText(encerra,         fontReg,  SN, maxW);

  const totalH = lIntro.length   * LHN + GAP +
                 lTitulo.length  * LHT + GAP +
                 lAutoria.length * LHN + GAP +
                 lAutores.length * LHA + GAP +
                 lEncerra.length * LHN;

  const areaTop    = height - 111.9;
  const areaBottom = height - 651.8;
  let y = areaBottom + ((areaTop - areaBottom) + totalH) / 2;

  const drawLeft = (lines, font, size, lh, color) => {
    for (const l of lines) {
      page.drawText(l, { x: xLeft, y, font, size, color });
      y -= lh;
    }
  };
  const drawCenter = (lines, font, size, lh, color) => {
    for (const l of lines) {
      const tw = font.widthOfTextAtSize(l, size);
      page.drawText(l, { x: cx - tw/2, y, font, size, color });
      y -= lh;
    }
  };

  drawLeft(lIntro,   fontReg,  SN, LHN, DARK); y -= GAP;
  drawCenter(lTitulo, fontBold, ST, LHT, TEAL); y -= GAP;
  drawLeft(lAutoria, fontReg,  SN, LHN, DARK); y -= GAP;
  drawCenter(lAutores,fontBold, SA, LHA, TEAL); y -= GAP;
  drawLeft(lEncerra, fontReg,  SN, LHN, DARK);

  const pdfBytes = await pdfDoc.save();
  const safeName = trabalho.titulo.slice(0,30).replace(/\s+/g,'_').replace(/[^\w_]/g,'');
  download(pdfBytes, `certificado_${safeName}.pdf`);
}

// ── Helpers ───────────────────────────────────────────────────────────────
function wrapText(text, font, size, maxW) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (font.widthOfTextAtSize(test, size) <= maxW) {
      line = test;
    } else {
      if (line) lines.push(line);
      line = w;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function wrapSegments(segments, size, maxW, fontReg, fontBold) {
  const tokens = [];
  for (const { text, bold } of segments) {
    const words = text.split(' ');
    words.forEach((w, i) => {
      const token = (i < words.length - 1 || text.endsWith(' ')) ? w + ' ' : w;
      if (token.trim()) tokens.push({ text: token, bold });
    });
  }

  const lines = [];
  let line = [], lineW = 0;
  for (const { text, bold } of tokens) {
    const font = bold ? fontBold : fontReg;
    const tw = font.widthOfTextAtSize(text, size);
    if (lineW + tw <= maxW) {
      line.push({ text, bold }); lineW += tw;
    } else {
      if (line.length) lines.push(line);
      line = [{ text, bold }]; lineW = tw;
    }
  }
  if (line.length) lines.push(line);
  return lines;
}

function download(bytes, filename) {
  const blob = new Blob([bytes], { type: 'application/pdf' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function showMsg(id, type, text) {
  const el = document.getElementById(id);
  el.className = `msg ${type} show`;
  el.textContent = text;
}
function hideMsg(id) {
  const el = document.getElementById(id);
  el.className = 'msg';
}

// Enter nos inputs
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('input-email').addEventListener('keydown', e => {
    if (e.key === 'Enter') buscarPorEmail();
  });
  document.getElementById('input-nome').addEventListener('keydown', e => {
    if (e.key === 'Enter') buscarPorNome();
  });
});
</script>
</body>
</html>
